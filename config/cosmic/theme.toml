# CobaltOS COSMIC theme defaults
# Installed to /etc/cobaltos/cosmic/theme.toml at first boot

[colors]
# Primary brand color — cobalt blue
accent = "#0047AB"

# Background palette
background = "#111318"
surface    = "#1a1e28"
surface2   = "#222736"

# Text palette
text_primary   = "#e8eaf6"
text_secondary = "#9aa0b5"

[theme]
# "dark" or "light"
mode = "dark"

# Window decorations
active_border   = "#0047AB"
inactive_border = "#2e3550"

[fonts]
interface = "Inter"
monospace = "JetBrains Mono"
interface_size = 10
monospace_size = 11

[animations]
enabled = true
