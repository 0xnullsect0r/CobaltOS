#!/usr/bin/env bash
# CobaltOS live session configuration
# This file is placed at /etc/live/config.d/10-cobaltos.conf
# and controls live-build session behavior.

# Use live user named "cobalt"
LIVE_USER_DEFAULT_GROUPS="audio cdrom dip floppy video plugdev netdev powerdev scanner bluetooth"
LIVE_USER_FULLNAME="CobaltOS Live User"
LIVE_HOSTNAME="cobaltos-live"

# Auto-login to COSMIC session
LIVE_AUTOLOGIN=true
