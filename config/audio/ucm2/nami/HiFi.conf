# Nami platform HiFi Use Case
# Intel Coffee Lake SOF audio — generic nami profile

SectionVerb {
    Value {
        PlaybackPCM "hw:sofrt5682max,0"
        CapturePCM  "hw:sofrt5682max,0"
    }

    EnableSequence [
        cset "name='Headphone Playback Switch' on"
        cset "name='Speaker Playback Switch' on"
    ]

    DisableSequence [
        cset "name='Headphone Playback Switch' off"
        cset "name='Speaker Playback Switch' off"
    ]
}

SectionDevice."Speaker" {
    Comment "Internal Speakers"
    Value { PlaybackChannels 2 }
}

SectionDevice."Headphones" {
    Comment "Headphone Jack"
    Value {
        PlaybackChannels 2
        JackControl "Headphone Jack"
    }
}
