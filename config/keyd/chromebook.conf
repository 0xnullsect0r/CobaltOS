# CobaltOS default keyd chromebook keyboard config
# Installed to /etc/keyd/chromebook.conf by cobalt-hardware-probe
#
# This base config is overridden per-board by cobalt-hardware-probe
# at first boot. Manual edits here are safe.

[ids]
*

[main]
# Remap Search/Capslock → Super (Meta/Windows key)
capslock = leftmeta
search = leftmeta

# ChromeOS top-row keys → media/function actions
f1 = back
f2 = forward
f3 = refresh
f4 = f11
f5 = f5
f6 = brightnessdown
f7 = brightnessup
f8 = mute
f9 = volumedown
f10 = volumeup

[meta]
# Hold Search to access F1-F10
f1 = f1
f2 = f2
f3 = f3
f4 = f4
f5 = f5
f6 = f6
f7 = f7
f8 = f8
f9 = f9
f10 = f10
