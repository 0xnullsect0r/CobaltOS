# keyd config for Google Pixelbook (eve)
# Remaps Chromebook top-row keys to standard function keys and media keys

[ids]
*

[main]
# Top-row: F1–F10 mapped to function keys with overlay
back           = f1
forward        = f2
refresh        = f3
fullscreen     = f4
display_toggle = f5
brightness_down = f6
brightness_up  = f7
mute           = f8
volume_down    = f9
volume_up      = f10

# Caps lock → Escape (Chromebook default, no CapsLock key)
capslock = esc

# Search/Launcher → Super
search = super

# Alt + top-row = media/function keys (held alt = secondary layer)
[alt]
back           = previoussong
forward        = nextsong
refresh        = stopcd
fullscreen     = playpause
display_toggle = f5
brightness_down = kbdillumdown
brightness_up  = kbdillumup
mute           = mute
volume_down    = volumedown
volume_up      = volumeup
